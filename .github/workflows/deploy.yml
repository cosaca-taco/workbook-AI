name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps:deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 💡 ここを大改造！ GitHub Pages公開時に、URLとAPIキーを正しい形に自動合成します
      - name: Create env.js dynamically
        run: |
          echo 'window.FIREBASE_DB_URL = "https://workbook-ai-taco-default-rtdb.asia-southeast1.firebasedatabase.app/";' > public/env.js
          echo 'window.GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}";' >> public/env.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4