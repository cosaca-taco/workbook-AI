<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理者用】問題＆解説エディタ（修正・削除機能付き）</title>
    <script src="env.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; color: #ecf0f1; padding: 20px; }
        .wrapper { max-width: 1000px; margin: 0 auto; display: flex; gap: 30px; flex-wrap: wrap; }
        .panel { flex: 1; min-width: 300px; background: #34495e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); box-sizing: border-box; }
        h1, h2 { text-align: center; color: #3498db; margin-top: 0; }
        h2 { color: #e67e22; border-bottom: 2px solid #e67e22; padding-bottom: 8px; text-align: left; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #bdc3c7; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #7f8c8d; background: #2c3e50; color: white; box-sizing: border-box; font-size: 16px; }
        textarea { height: 80px; resize: vertical; }
        
        /* 💾 ボタンのスタイル */
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #27ae60; }
        button:disabled { background: #7f8c8d !important; cursor: not-allowed; }
        
        /* 📜 リスト＆操作ボタンのスタイル */
        .list-container { max-height: 550px; overflow-y: auto; padding-right: 10px; }
        .grade-section { margin-bottom: 20px; background: #2c3e50; padding: 15px; border-radius: 8px; }
        .grade-title { font-size: 18px; font-weight: bold; color: #f1c40f; margin: 0 0 10px 0; border-left: 4px solid #f1c40f; padding-left: 8px; }
        .subject-section { margin-left: 10px; margin-bottom: 10px; }
        .subject-title { font-size: 16px; font-weight: bold; color: #2ecc71; margin: 5px 0; }
        .unit-item { background: #34495e; padding: 10px; border-radius: 6px; margin: 5px 0 10px 15px; border-left: 3px solid #3498db; }
        .unit-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; color: #ecf0f1; align-items: center; }
        .unit-type { font-size: 11px; background: #3498db; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .unit-type.input-type { background: #9b59b6; }
        .unit-intro { font-size: 13px; color: #bdc3c7; margin: 5px 0; background: rgba(0,0,0,0.1); padding: 6px; border-radius: 4px; white-space: pre-wrap; }
        
        /* 🛠️ 編集・削除用インラインボタン */
        .action-btns { display: flex; gap: 5px; margin-top: 5px; justify-content: flex-end; }
        .action-btns button { width: auto; padding: 4px 10px; font-size: 12px; margin: 0; border-radius: 4px; }
        .edit-btn { background: #f39c12; }
        .edit-btn:hover { background: #d35400; }
        .delete-btn { background: #e74c3c; }
        .delete-btn:hover { background: #c0392b; }
        
        /* 🚨 編集モード中のアピール枠 */
        .edit-mode-active { border: 2px solid #f39c12 !important; background: #3d566e !important; }
        
        .status { padding: 10px; border-radius: 6px; margin-top: 15px; font-weight: bold; text-align: center; display: none; }
        .success { background: #27ae60; color: white; }
        .error { background: #c0392b; color: white; }
        .loading { text-align: center; color: #bdc3c7; font-style: italic; }
    </style>
</head>
<body>

    <h1 style="color: #ecf0f1; margin-bottom: 30px;">🛠️ AI学習ドリル・モンスターズ 管理システム</h1>

    <div class="wrapper">
        <div id="form-panel" class="panel">
            <h2 id="form-title">単元の新規登録</h2>
            <div class="form-group">
                <label>① 対象の学年</label>
                <select id="admin-grade">
                    <option value="小学1年生">小学1年生</option>
                    <option value="小学2年生">小学2年生</option>
                    <option value="小学3年生">小学3年生</option>
                </select>
            </div>

            <div class="form-group">
                <label>② 教科（例：算数、国語）</label>
                <input type="text" id="admin-subject" placeholder="算数" value="算数">
            </div>

            <div class="form-group">
                <label>③ 単元名</label>
                <input type="text" id="admin-unit" placeholder="ひきざん（くりさがりなし）">
            </div>

            <div class="form-group">
                <label>④ 出題形式</label>
                <select id="admin-type">
                    <option value="choice">4択問題（ボタンを選択）</option>
                    <option value="input">記述問題（キーボード入力）</option>
                </select>
            </div>

            <div class="form-group">
                <label>⑤ おすすめ問題数</label>
                <input type="number" id="admin-count" min="1" max="10" value="3">
            </div>

            <div class="form-group">
                <label>⑥ お父様手作りの「解説・アドバイス文」</label>
                <textarea id="admin-intro" placeholder="ここにコツを書いてあげてください。"></textarea>
            </div>

            <button id="save-btn">💾 Firebaseへ保存する</button>
            <button id="cancel-edit-btn" style="background:#7f8c8d; display:none;">❌ 編集をキャンセル</button>
            <div id="status-box" class="status"></div>
        </div>

        <div class="panel">
            <h2>登録済みデータ一覧</h2>
            <div id="list-loading" class="loading">データベースから データを読み込み中...</div>
            <div id="data-list-container" class="list-container"></div>
        </div>
    </div>

    <script>
        // 現在「編集モード」で選択している単元のインデックスを記憶する変数（nullなら新規登録）
        let editingIndex = null;
        let globalGradesData = null; // ローカルに保持するキャッシュデータ

        // 🚀 起動時・データ変更時にツリーリストを再描画する関数
        async function refreshDataList() {
            const container = document.getElementById("data-list-container");
            const loadingText = document.getElementById("list-loading");
            const dbUrl = window.FIREBASE_DB_URL;

            if (!dbUrl || dbUrl.includes("あなたのプロジェクト名")) {
                loadingText.innerText = "URLが未設定のためリストを読み込めません。";
                return;
            }

            try {
                const response = await fetch(`${dbUrl}grades.json`);
                if (!response.ok) throw new Error();
                globalGradesData = await response.json();

                loadingText.style.display = "none";
                container.innerHTML = "";

                if (!globalGradesData) {
                    container.innerHTML = "<p style='text-align:center; color:#cbd5e1;'>まだ登録されているデータはありません。</p>";
                    return;
                }

                // 学年ループ
                Object.keys(globalGradesData).sort().forEach(gradeName => {
                    const gradeBox = document.createElement("div");
                    gradeBox.className = "grade-section";
                    gradeBox.innerHTML = `<div class="grade-title">📁 ${gradeName}</div>`;

                    const subjectsData = globalGradesData[gradeName];
                    
                    // 教科ループ
                    Object.keys(subjectsData).forEach(subjectName => {
                        const subjectBox = document.createElement("div");
                        subjectBox.className = "subject-section";
                        subjectBox.innerHTML = `<div class="subject-title">└── 📘 ${subjectName}</div>`;

                        const unitsList = subjectsData[subjectName];
                        if (Array.isArray(unitsList)) {
                            unitsList.forEach((unitData, index) => {
                                if (!unitData) return; // 削除済みの空要素はスキップ

                                const typeText = unitData.type === "choice" ? "4択" : "入力";
                                const typeClass = unitData.type === "choice" ? "" : "input-type";

                                const unitItem = document.createElement("div");
                                unitItem.className = "unit-item";
                                unitItem.innerHTML = `
                                    <div class="unit-header">
                                        <span>📝 ${unitData.unit} (${unitData.defaultQuestions}問)</span>
                                        <span class="unit-type ${typeClass}">${typeText}</span>
                                    </div>
                                    <div class="unit-intro">${unitData.intro || "（解説なし）"}</div>
                                    <div class="action-btns">
                                        <button class="edit-btn" onclick="startEdit('${gradeName}', '${subjectName}', ${index})">✏️ 修正する</button>
                                        <button class="delete-btn" onclick="deleteUnit('${gradeName}', '${subjectName}', ${index})">🗑️ 削除</button>
                                    </div>
                                `;
                                subjectBox.appendChild(unitItem);
                            });
                        }
                        gradeBox.appendChild(subjectBox);
                    });
                    container.appendChild(gradeBox);
                });

            } catch (error) {
                loadingText.innerText = "データの読み込みに失敗しました。";
            }
        }

        // ✏️ 修正モードを開始する処理（ボタンクリックで発動）
        window.startEdit = function(grade, subject, index) {
            const unitData = globalGradesData[grade][subject][index];
            editingIndex = index; // 修正対象の配列番号をキープ

            // 左側の入力フォームに、選んだデータを一瞬で流し込む
            document.getElementById("admin-grade").value = grade;
            document.getElementById("admin-subject").value = subject;
            document.getElementById("admin-unit").value = unitData.unit;
            document.getElementById("admin-type").value = unitData.type;
            document.getElementById("admin-count").value = unitData.defaultQuestions;
            document.getElementById("admin-intro").value = unitData.intro || "";

            // 学年と教科は、修正中にブレると危険なので一時的に編集不可にする
            document.getElementById("admin-grade").disabled = true;
            document.getElementById("admin-subject").disabled = true;

            // フォームの見た目を「修正モード」に変更
            document.getElementById("form-panel").classList.add("edit-mode-active");
            document.getElementById("form-title").innerText = "⚠️ 単元の修正・上書きモード";
            document.getElementById("save-btn").innerText = "🔄 修正内容で上書き保存する";
            document.getElementById("cancel-edit-btn").style.display = "block";
            
            document.getElementById("admin-unit").focus();
        };

        // ❌ 修正モードをキャンセルして元に戻す処理
        function cancelEdit() {
            editingIndex = null;
            document.getElementById("admin-grade").disabled = false;
            document.getElementById("admin-subject").disabled = false;
            document.getElementById("form-panel").classList.remove("edit-mode-active");
            document.getElementById("form-title").innerText = "単元の新規登録";
            document.getElementById("save-btn").innerText = "💾 Firebaseへ保存する";
            document.getElementById("cancel-edit-btn").style.display = "none";

            document.getElementById("admin-unit").value = "";
            document.getElementById("admin-intro").value = "";
        }
        document.getElementById("cancel-edit-btn").addEventListener("click", cancelEdit);

        // 💾 保存（新規登録 ＆ 上書き修正 共通）ボタンの処理
        document.getElementById("save-btn").addEventListener("click", async () => {
            const statusBox = document.getElementById("status-box");
            statusBox.style.display = "none";

            const grade = document.getElementById("admin-grade").value;
            const subject = document.getElementById("admin-subject").value.trim();
            const unitName = document.getElementById("admin-unit").value.trim();
            const type = document.getElementById("admin-type").value;
            const count = parseInt(document.getElementById("admin-count").value) || 3;
            const intro = document.getElementById("admin-intro").value.trim();

            if (!subject || !unitName || !intro) {
                showStatus("すべての項目を入力してください！", "error");
                return;
            }

            const dbUrl = window.FIREBASE_DB_URL;
            document.getElementById("save-btn").innerText = "通信中...";
            document.getElementById("save-btn").disabled = true;

            try {
                const fetchUrl = `${dbUrl}grades/${grade}/${subject}.json`;
                
                // 1. まず現在の配列をFirebaseからダウンロード
                const response = await fetch(fetchUrl);
                let currentUnits = [];
                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data)) currentUnits = data;
                }

                const newUnitData = {
                    unit: unitName,
                    defaultQuestions: count,
                    type: type,
                    intro: intro
                };

                if (editingIndex !== null) {
                    // 【修正モードの場合】指定された番号の中身を丸ごと上書き！
                    currentUnits[editingIndex] = newUnitData;
                } else {
                    // 【新規登録の場合】配列の末尾に新しく追加！
                    currentUnits.push(newUnitData);
                }

                // 2. FirebaseへPUTで一括上書き送信
                const saveResponse = await fetch(fetchUrl, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(currentUnits)
                });

                if (!saveResponse.ok) throw new Error("Firebaseへの書き込みに失敗しました。");

                showStatus(editingIndex !== null ? "🎉 修正が上書き保存されました！" : "🎉 新しい単元を追加しました！", "success");
                
                cancelEdit(); // フォームを通常状態にリセット
                refreshDataList(); // リストを最新に更新

            } catch (error) {
                showStatus(`エラーが発生しました: ${error.message}`, "error");
            } finally {
                document.getElementById("save-btn").disabled = false;
            }
        });

        // 🗑️ 単元の削除処理
        window.deleteUnit = async function(grade, subject, index) {
            const unitData = globalGradesData[grade][subject][index];
            if (!confirm(`本当に「${unitData.unit}」を削除してもよろしいですか？`)) return;

            const dbUrl = window.FIREBASE_DB_URL;
            try {
                const fetchUrl = `${dbUrl}grades/${grade}/${subject}.json`;
                
                // 配列から該当の単元を綺麗に消去する
                let currentUnits = globalGradesData[grade][subject];
                currentUnits.splice(index, 1); // 削除実行

                // 残った配列（空っぽになった場合は空の配列）をFirebaseに送り直す
                const saveResponse = await fetch(fetchUrl, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(currentUnits)
                });

                if (!saveResponse.ok) throw new Error();
                
                showStatus("🗑️ 単元を削除しました。", "success");
                cancelEdit();
                refreshDataList();

            } catch (error) {
                showStatus("削除に失敗しました。", "error");
            }
        };

        function showStatus(msg, type) {
            const statusBox = document.getElementById("status-box");
            statusBox.innerText = msg;
            statusBox.className = `status ${type}`;
            statusBox.style.display = "block";
        }

        // ページを開いた瞬間にリストを表示
        refreshDataList();
    </script>
</body>
</html>
