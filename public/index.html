<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学習ドリル・モンスターズ</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="env.js"></script>
    <script src="app.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 25px; }
        
        /* 🔑 ログイン・ユーザー選択画面 */
        .login-box { display: block; padding: 20px; }
        .user-grid { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; min-height: 100px; }
        .user-card { background: #f8fafc; border: 2px solid #cbd5e1; border-radius: 12px; padding: 15px; width: 120px; cursor: pointer; transition: all 0.2s; }
        .user-card:hover { border-color: #3498db; background: #eaf2f8; transform: translateY(-3px); }
        .user-avatar { font-size: 40px; margin-bottom: 5px; }
        .user-name { font-weight: bold; color: #334155; }

        /* 🆕 プレイヤー新規登録フォーム */
        .register-box { display: none; background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 20px; }
        .avatar-selector { display: flex; justify-content: center; gap: 15px; font-size: 32px; margin: 15px 0; }
        .avatar-option { cursor: pointer; padding: 5px; border: 2px solid transparent; border-radius: 8px; transition: all 0.2s; }
        .avatar-option:hover { transform: scale(1.2); }
        .avatar-option.selected { border-color: #e67e22; background: #fef9e7; transform: scale(1.2); }
        
        .action-link { color: #3498db; cursor: pointer; text-decoration: underline; margin-top: 15px; display: inline-block; font-size: 14px; }

        /* 🛠️ 設定メニューエリア */
        #menu-area { display: none; }
        .player-info-bar { background: #e2e8f0; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        .setup-group { margin: 15px 0; text-align: left; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        label { font-weight: bold; color: #4a5568; display: block; margin-bottom: 5px; }
        select, input, button { font-size: 16px; padding: 10px; width: 100%; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        
        .btn-container { display: flex; gap: 10px; margin-top: 15px; }
        .info-btn { background-color: #e67e22; color: white; border: none; cursor: pointer; font-weight: bold; }
        .info-btn:hover { background-color: #d35400; }
        .battle-btn { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        .battle-btn:hover { background-color: #2980b9; }
        button:disabled { background-color: #cbd5e1 !important; cursor: not-allowed; }
        
        .local-intro-box { margin-top: 15px; padding: 15px; border: 2px dashed #e67e22; border-radius: 8px; background-color: #fff9f2; text-align: left; display: none; }
        .quiz-box { margin-top: 30px; padding: 20px; border: 2px solid #3498db; border-radius: 10px; background-color: #fcfcfc; display: none; text-align: left; }
        .error-message { color: #e74c3c; font-weight: bold; margin-top: 20px; background: #fadbd8; padding: 15px; border-radius: 8px; display: none; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👾 AI学習ドリル・モンスターズ 👾</h1>
        
        <div id="login-area" class="login-box">
            <h2>👤 だれが ぼうけんする？</h2>
            <div id="loading-users" style="color:#7f8c8d; font-style:italic;">プレイヤーを よみこみちゅう...</div>
            <div id="user-list-grid" class="user-grid"></div>
            
            <span class="action-link" id="go-to-register-btn">➕ あたらしい プレイヤーを つくる</span>
        </div>

        <div id="register-area" class="register-box">
            <h2>➕ あたらしい プレイヤー登録</h2>
            <div style="text-align: left; margin-bottom: 15px;">
                <label>おなまえ（ニックネーム）</label>
                <input type="text" id="new-user-name" placeholder="例：たくと">
            </div>
            <div style="text-align: left;">
                <label>すきな アイコンを えらんでね</label>
                <div class="avatar-selector">
                    <span class="avatar-option" onclick="selectAvatar('👦')">👦</span>
                    <span class="avatar-option" onclick="selectAvatar('👧')">👧</span>
                    <span class="avatar-option" onclick="selectAvatar('🦁')">🦁</span>
                    <span class="avatar-option" onclick="selectAvatar('🐉')">🐉</span>
                    <span class="avatar-option" onclick="selectAvatar('🦊')">🦊</span>
                    <span class="avatar-option" onclick="selectAvatar('🦄')">🦄</span>
                </div>
            </div>
            <button id="submit-register-btn" style="background:#2ecc71; color:white; font-weight:bold; margin-top:10px;">🎒 これで ぼうけんを はじめる！</button>
            <br>
            <span class="action-link" id="go-to-login-btn">⬅️ もどる</span>
        </div>

        <div id="menu-area">
            <div class="player-info-bar">
                <span>プレイヤー: <span id="current-player-display">---</span></span>
                <button onclick="logout()" style="width:auto; padding:3px 10px; font-size:12px; background:#7f8c8d; color:white; border:none; margin:0;">こうたいする</button>
            </div>

            <div class="setup-group">
                <label>① がくねんを えらぼう</label>
                <select id="grade-select">
                    <option value="">-- がくねんを えらんでね --</option>
                    <option value="小学1年生">小学1年生</option>
                    <option value="小学2年生">小学2年生</option>
                    <option value="小学3年生">小学3年生</option>
                </select>
            </div>
            <div class="setup-group">
                <label>② きょうかを えらぼう</label>
                <select id="subject-select" disabled><option value="">-- まずは がくねんを えらんでね --</option></select>
            </div>
            <div class="setup-group">
                <label>③ たんげんを えらぼう</label>
                <select id="unit-select" disabled><option value="">-- きょうかを えらんでね --</option></select>
            </div>
            <div class="setup-group">
                <label>④ もんだいすう</label>
                <input type="number" id="question-count" min="1" max="10" value="3">
            </div>
            <div class="btn-container">
                <button id="show-intro-btn" class="info-btn" disabled>📖 せんせいの 解説をよむ</button>
                <button id="start-battle-btn" class="battle-btn" disabled>⚔️ もんだいに いどむ！</button>
            </div>
            <div id="local-intro-area" class="local-intro-box">
                <h3 style="margin:0 0 5px 0; color:#d35400;">💡 せんせいの アドバイス</h3>
                <p id="local-intro-text" style="margin:0; font-size:15px; line-height:1.5; white-space:pre-wrap;"></p>
            </div>
        </div>

        <div id="error-box" class="error-message"></div>
        <div id="quiz-area" class="quiz-box"></div>
    </div>
</body>
</html>
